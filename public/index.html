<html lang="en">
<head>

<title>Lifted Industries — Systems</title>
<meta name="description" content="Lifted Industries brand systems and guidelines.">
<!-- Favicon -->
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="theme-color" content="#071018">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ion:#22D3EE; --ion-deep:#0EA5C9; --carbon:#071018;
    --deep-teal:#0E3A4A; --mist:#8ED6E8; --ink:#0B0F16;
    --display:'Space Grotesk',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--display);
    background:var(--carbon);
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ---- sticky header ---- */
  header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px clamp(20px,5vw,56px);
    background:rgba(7,16,24,.72);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(34,211,238,.14);
  }
  header .brandmark img{height:34px;display:block}
  header .brandmark{display:flex;align-items:center;text-decoration:none}
  nav{display:flex;align-items:center;gap:8px}
  .nav-link{
    font-family:var(--mono); font-size:13px; letter-spacing:.06em;
    text-transform:uppercase; color:var(--mist); text-decoration:none;
    padding:10px 18px; border-radius:999px;
    border:1px solid rgba(34,211,238,.28);
    transition:all .22s ease;
    white-space:nowrap;
  }
  .nav-link:hover{
    color:var(--ink);
    background:linear-gradient(90deg,var(--ion),var(--ion-deep));
    border-color:transparent;
    box-shadow:0 6px 24px -8px rgba(34,211,238,.55);
  }
  .nav-link:focus-visible{outline:2px solid var(--ion);outline-offset:3px}

  /* ---- gradient hero field ---- */
  .hero{
    position:relative;
    min-height:calc(100vh - 71px);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:40px 24px 80px;
    isolation:isolate;
    overflow:hidden;
  }
  /* layered brand gradient: carbon base + deep teal + ion glow */
  .hero::before{
    content:""; position:absolute; inset:0; z-index:-2;
    background:
      radial-gradient(120% 90% at 50% 8%, rgba(34,211,238,.20), transparent 55%),
      radial-gradient(140% 120% at 50% 120%, rgba(14,165,201,.42), transparent 60%),
      linear-gradient(165deg, var(--carbon) 0%, var(--deep-teal) 58%, var(--ion-deep) 120%);
  }
  /* soft moving aurora */
  .hero::after{
    content:""; position:absolute; z-index:-1;
    width:140vmax; height:140vmax; left:50%; top:115%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(34,211,238,.30), transparent 42%);
    filter:blur(40px);
    animation:drift 18s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{transform:translate(-50%,-50%) scale(1)}
    50%{transform:translate(-46%,-54%) scale(1.12)}
  }
  /* top hairline of brand gradient */
  .hero .topline{
    position:absolute; top:0; left:0; right:0; height:3px; z-index:1;
    background:linear-gradient(90deg,var(--ion),var(--ion-deep));
  }

  .logo-wrap{
    opacity:0; transform:translateY(14px);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .15s forwards;
  }
  .logo-wrap img{
    width:min(420px,72vw); height:auto; display:block;
    filter:drop-shadow(0 18px 50px rgba(0,0,0,.45));
  }
  @keyframes rise{to{opacity:1;transform:none}}

  .tagline{
    margin-top:30px;
    font-family:var(--mono); font-size:clamp(12px,2.4vw,15px);
    letter-spacing:.34em; text-transform:uppercase; color:var(--mist);
    opacity:0; animation:fade 1s ease .55s forwards;
  }
  .ruo{
    margin-top:14px;
    font-family:var(--mono); font-size:11px; letter-spacing:.16em;
    color:rgba(142,214,232,.55);
    opacity:0; animation:fade 1s ease .8s forwards;
  }
  @keyframes fade{to{opacity:1}}

  footer{
    position:absolute; bottom:0; left:0; right:0;
    padding:22px 24px;
    text-align:center;
    font-family:var(--mono); font-size:11px; letter-spacing:.12em;
    color:rgba(142,214,232,.5);
  }

  @media (max-width:560px){
    header{padding:14px 18px}
    header .brandmark img{height:28px}
    .nav-link{font-size:11px;padding:9px 14px}
  }
  @media (prefers-reduced-motion:reduce){
    .hero::after{animation:none}
    .logo-wrap,.tagline,.ruo{animation:none;opacity:1;transform:none}
  }
</style>
</head>
